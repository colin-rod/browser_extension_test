<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Sellpy matches</title>
    <link rel="stylesheet" href="results.css" />
</head>
<body>
    <header class="page-header">
        <div id="query-thumb" class="query-thumb" aria-hidden="true"></div>
        <img src="icons/icon128.png" class="sellpy-logo" alt="Sellpy" />
        <h1 class="page-title">Shop this item second hand on Sellpy</h1>
        <button id="debug-toggle" class="debug-toggle" type="button" aria-label="Toggle debug info" title="Toggle debug info">···</button>
    </header>
    <div id="debug-info" class="debug-info" hidden></div>
    <section id="query-pane" class="query-pane" hidden>
        <div class="query-stage">
            <img id="query-image" class="query-image" alt="" />
            <canvas id="crop-overlay" class="crop-overlay"></canvas>
        </div>
        <div class="query-actions">
            <button id="crop-search" class="crop-search" type="button" hidden>Search this area</button>
            <button id="crop-clear" class="crop-clear" type="button" hidden>Clear</button>
            <span id="crop-error" class="crop-error" hidden></span>
        </div>
    </section>
    <div id="filter-bar" class="filter-bar" hidden></div>
    <div id="missing-banner-host" class="missing-banner-host"></div>
    <main id="results">
        <div class="grid skeleton-grid" id="skeleton">
            <div class="card skeleton-card"></div>
            <div class="card skeleton-card"></div>
            <div class="card skeleton-card"></div>
            <div class="card skeleton-card"></div>
            <div class="card skeleton-card"></div>
            <div class="card skeleton-card"></div>
        </div>
    </main>
    <script src="results.js" type="module"></script>
</body>
</html>
